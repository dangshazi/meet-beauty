name: meet_beauty
description: "AI Makeup Coaching App - Learn makeup techniques with real-time face tracking and personalized tutorials."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Camera & Permissions
  camera: ^0.11.0+2
  permission_handler: ^11.3.1

  # Face Detection
  google_mlkit_face_detection: ^0.12.0

  # Image Processing
  image: ^4.5.3

  # Navigation
  go_router: ^15.1.2

  # UI Components
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/makeup_styles/
    - assets/tutorial_data/
